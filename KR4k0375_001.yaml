body:
  text: 范亨燕書高祖武宣皇帝紀高祖慕容廆少有大度雄略傑出晉安北將軍張華雅有人鑒鎮薊總御諸部高祖弱冠往見華甚異之謂高祖曰君必為命世之器匡時濟難者也脫所著幘簪以遺高祖結殷勤而別御覽四百七十八又六百八十八廆泰始五年生年十五父單于涉歸卒通鑑晉紀孝異三太康四年慕容涉歸卒弟刪篡立同上刪謀殺廆廆亡國人殺刪迎廆立之高祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免御覽七百九太安元年素怒延圍廆於棘城出擊大破之通鑑晉紀考異六晉室大亂高祖方經略江東高翔説高祖曰自王公政錯士人失望襁負歸公者動有萬數今王氏敗沒而福星見尾箕其兆可見也今晉室雖衰人心未變宜遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下高祖深納焉御覽四百六十二破鮮卑宇文部獲皇帝玉璽使裴嶷送建鄴以獻捷裴嶷至自建鄴大興四年以慕容廆為車騎大將軍平州刺史通鑑晉紀考異十三太寧三年石勒使乞得歸來伐廆遣世子皓擊之以仁為左翼乞得歸拒皓遣兄子悉拔雄拒仁同上十五太祖文明皇帝紀咸康四年四月石虎王燕城下會鄴使至云太子邃在後恣酒入宮殺害石主大恐狼狽引還通鑑晉紀考異十七初帳下吳胄使鄴還説四月浴佛日行像詣宮石太子邃騎出迎像往來馳騁無有儲君體王曰古者觀威儀以定禍福此子虎之副二而輕佻無禮將不得其死然及石主東歸留邃監國荒敗內亂以致誅戮同上咸康齊年燕王皓襲趙略燕范陽二郡男女數千口而還通鑑晉紀考異十八太祖皓八年使楊裕唐柱等築龍城立門闕宮殿廟園藉田後遂改為龍城縣御覽百九十二建元二年八月皓遣世子俊帥前軍帥評等擊代通鑑晉紀考異十九按載記未記此事建元二年皓伐宇文逸豆歸遣南羅大涉夜干逆戰同上烈祖景昭皇帝紀永和五年趙亂四月集兵二十餘萬為進取之計通鑑晉紀考異二十永和八年三月己酉冉閔殺劉顯及其公卿已下百餘人同上二十一冉閔妻得璽以獻因以永和八年僭即皇帝位建元曰元璽元璽元年蔣幹遣待中繆嵩太子詹事劉猗齎傳國璽詣晉求救猗負璽亡匿私行數里忽黃霧四塞迷路不得進乃復故道還易取行璽始得去書鈔百三十一事類賦注三御覽十五又六百八十壽光二年升平二年十二月晉荀羌寇泰山殺太守賈堅通鑑晉紀考異二十二少帝紀興寧初暐使慕容評寇許昌懸瓠陳城並陷之遂略汝南諸郡興寧元年汝南太守朱黎襲許昌克之通鑑晉紀考異二十三太和四年此年十二月王猛攻洛陽明年正月拔洛同上二十四王猛與慕容評相遇於潞川也評鄣固山泉鬻水與軍人絹匹水二石水經注十世祖成武皇帝紀建興十年慕容寶自河而還軍敗於參合死者六萬人十一年垂衆北至參合見積骸如山設策弔之死者父兄皆號泣六軍哀慟垂慚憤嘔血因而寢疾焉輿過平城北四十里疾篤築燕昌城而還水經注十三獻莊皇帝紀慕容令之奔還鄴建熙元年二月也通鑑晉紀考異二十四烈宗惠愍皇帝紀愍帝時有異爵素質緑首集於端門東園樹栖翔二旬而去夏四月以異爵故大赦名東園曰白爵園類聚九十九御覽八百二十四按載記作昭武時事中宗昭武皇帝紀秋七月丁卯昭武帝營新殿昌黎大棘城縣河岸崩出鐵築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出人神允協之應也賜陵爵關外御覽百七十五又七百六十二昭文皇帝紀文帝熙平二年左部民得玉璽玉鼎御覽八百四昭文帝時左部民得紫璧以獻同上八五六慕容仁傳從世子皓擊乞得歸歸遣兄子悉拔堆拒仁仁擊悉拔堆斬之通鑑晉紀考異十五慕容翰傳翰嘗臨陳為流矢所中病臥歲時不出久後漸差試馬或告稱翰病而私習騎乘疑欲為變乃賜翰死通鑑晉紀考異十九慕容恪傳慕容恪之威聲震於外敵初烈祖崩晉人喜曰中原可圖矣桓溫曰慕容恪尚存所憂方重耳御覽四百六十九王誕傳初王誕亡歸李臻説臻討王浚臻遣其子咸擊之龐本與臻有隙乘虛襲殺臻遣人殺咸誕亡歸慕容廆通鑑晉紀考異九周存傳周存字道名上谷漁陽人王彭祖叛母遇寇流離失所時在分崩州郡隔異存冒難尋求自河以北無不周遍存亡無問後傳在昌黎而時已屬段氏昌黎土地燕之所統存徑投高祖高祖客之為置酒於坐問存君失母來幾年朿見當識否高祖言音未止存涕泗覆面尋聲而對辭甚悲酸舉坐莫不慷慨高祖亦為之動容由是意遇倍加存停期年不得母問將辭歸高祖意欲留之而未顯也存覺微旨陳謝曰聶政荊軻刺客之流意氣之激顧甘死奉韓今明公無求於徵用而見接以國士應終身奉給以答厚恩然老母未審存亡弟小無所依倚寢食未敢廢心昔徐庶指方寸以求辭以存披肝以表情願明公恕之高祖矜而聽去御覽四百十三慕輿根傳慕輿根善射嘗從行獵有一野羊立於懸崖太祖命左右射之莫有中者根自募求射之一發而中御覽七百四十四宋該傳宋該字宣恆為左長史太祖會群僚以該性貪故賜布百餘匹負而歸重不能勝乃至僵頓以愧辱之類聚八十五御覽四百九十二又八百二十李湴傳李臻遣其成擊王浚通鑑晉紀考異九申弼傳列祖常從容問諸侍臣曰夫口以下動乃能制物鐵鑽為用亦噬嗑之意而從上下何也弼答曰口之下動上使下也鐵鑽之用上斬下也列祖稱善御覽三百六十七賈堅傳賈堅字世固彎弓三石餘列祖以堅善射故親試之乃取一牛置百步上召聖使射曰能中之乎堅曰少將之時能令不中今已老年正可中之恪大笑射發一矢拂脊再發一矢摩腹背附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為奇中之何難一發中之堅時年六十餘矣觀者咸服其妙御覽七百四十四列祖問堅年對以受新命始及三載列祖悅其言拜樂陵太守通鑑晉紀考異二十一梁琛傳梁琛使秦琛從兄奕先在秦為尚書郎會罷秦主欲令琛止奕舍琛語有司曰昔諸葛亮兄弟各處三國及其聘集公朝相見退無私面君子之土余敢忘乎竟不詣奕奕數就邸舍因問東國起居琛曰今二方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞何以見問類聚二十二御覽四百二十九孟高傳孟高字宏義長壯有雄姿慕容暐即位左遷衛將軍出避難將向龍都禁衛四散唯高及殿中將艾郎等千餘騎從行達福祿逢賊高獨力戰賦射殺之御覽四百十七皇甫真傳皇甫真字楚季安定朝那人也從輔國恪討擒冉閔即南圍拔鄴鄴石氏舊都城內珍玩寶貨充溢真無所取唯存恤人物收斂圖籍真上疏曰臣輒以家奴婢五十口馬七匹牛四十頭以助軍資御覽四百二十六奏遣郭辨從胸奴使詣鄴觀隙真覺其姦白暐請詰之評不許太和二年燕建熙八年皇甫真為太尉郭辨至燕通鑑晉紀考異二十三鄴城失守秦主初入臨前殿宴群臣數百人皆集東掖門見侍中王猛來真等望馬首拜之明日更見真乃卿猛猛曰昨拜朝卿何恭慢之相違真答曰卿昨為賊朝是國士吾宜拜賊而卿國士亦何所怪也猛嘉之御覽五百四十二鮮于休傳鮮于休有才器伎幹辟為左光祿大夫曹屬御覽二百四十九羅騰傳羅騰字叔龍工圍碁究盡其妙獨步當時俄而右北平樂抄少俊出與齊焉御覽七百五十三公孫鳳傳公孫鳳上谷人少帝建熙六年隱於昌黎之域冬衣單布寢於土床上夏則併餐茹於一器信使蛆臭然後乃食人咸異之慕能測也御覽七百又八百四十書鈔百四十三引作孫鳳
